name: Deploy Backend to Lambda

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'terraform/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        working-directory: ./backend
        run: dotnet restore
      
      - name: Build and publish application
        working-directory: ./backend
        run: dotnet publish --configuration Release --output ./publish --self-contained false
      
      - name: Create Lambda deployment package
        working-directory: ./backend/publish
        run: zip -r ./lambda-package.zip . -x "lambda-package.zip"
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
      
      - name: Terraform Init
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
      
      - name: Terraform Plan
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_database_connection_string: ${{ secrets.DATABASE_CONNECTION_STRING }}
          TF_VAR_token_key: ${{ secrets.TOKEN_KEY }}
          TF_VAR_api_domain: ${{ secrets.API_DOMAIN }}
          TF_VAR_cors_allowed_origins: '"${{ secrets.CORS_ALLOWED_ORIGINS }}"'
          TF_VAR_aws_ses_sender_email: ${{ secrets.AWS_SES_SENDER_EMAIL }}
          TF_VAR_email_base_url: ${{ secrets.EMAIL_BASE_URL }}
          TF_VAR_admin_seed_password: ${{ secrets.ADMIN_SEED_PASSWORD }}
        run: terraform plan -out=tfplan
      
      - name: Terraform Apply
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_database_connection_string: ${{ secrets.DATABASE_CONNECTION_STRING }}
          TF_VAR_token_key: ${{ secrets.TOKEN_KEY }}
          TF_VAR_api_domain: ${{ secrets.API_DOMAIN }}
          TF_VAR_cors_allowed_origins: '"${{ secrets.CORS_ALLOWED_ORIGINS }}"'
          TF_VAR_aws_ses_sender_email: ${{ secrets.AWS_SES_SENDER_EMAIL }}
          TF_VAR_email_base_url: ${{ secrets.EMAIL_BASE_URL }}
          TF_VAR_admin_seed_password: ${{ secrets.ADMIN_SEED_PASSWORD }}
        run: terraform apply -auto-approve tfplan
